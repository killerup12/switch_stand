<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Switch Stand</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
  <h1>Switch Stand</h1>
  <span id="status-bar">загрузка...</span>
  <div class="header-actions">
    <button id="btn-test-vpn">▶ Test VPN</button>
    <span id="vpn-test-result"></span>
    <button id="btn-settings">⚙</button>
  </div>
</header>

<div id="settings-panel" class="hidden">
  <div class="settings-row">
    <label>Роутер (IP или hostname)</label>
    <input id="setting-router-host" type="text" placeholder="192.168.254.1">
  </div>
  <div class="settings-row">
    <label>Пользователь SSH</label>
    <input id="setting-router-user" type="text" placeholder="admin">
  </div>
  <div class="settings-row">
    <label>DNS сервер (mihomo)</label>
    <input id="setting-mihomo-dns" type="text" placeholder="192.168.254.3">
  </div>
  <div class="settings-actions">
    <button id="btn-settings-save" class="primary">Сохранить</button>
    <button id="btn-settings-close">Отмена</button>
  </div>
</div>

<div id="dirty-banner" class="hidden">
  <span>⚠ У тебя несохранённые изменения</span>
  <div class="banner-actions">
    <button id="btn-apply" class="primary">Apply</button>
    <button id="btn-discard" class="danger" title="Discard changes">×</button>
  </div>
</div>

<main>
  <section id="proxies-section">
    <div class="proxies-header">
      <span class="proxies-title">Прокси</span>
      <div class="proxies-header-actions">
        <button id="btn-import-link">↓ По ссылке</button>
        <button id="btn-add-proxy">+ Добавить</button>
      </div>
    </div>
    <div id="proxies-list"></div>
    <div id="proxy-form-slot"></div>
  </section>

  <div id="groups-list"></div>
  <button id="btn-new-group">+ New Group</button>
</main>

<div id="toast" class="hidden"></div>

<script src="/static/app.js"></script>
</body>
</html>
